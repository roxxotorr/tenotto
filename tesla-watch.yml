name: Tesla Model Y Watcher

on:
  schedule:
    - cron: "*/10 * * * *"   # alle 10 Minuten (GitHub-Minimum ~5 Min, real oft etwas unregelmäßiger)
  workflow_dispatch: {}       # erlaubt manuelles Starten über die GitHub-Oberfläche/App

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Bestand prüfen
        run: python tesla_model_y_watcher.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

      - name: Gesehene VINs zurückschreiben
        run: |
          git config user.name "tesla-watcher-bot"
          git config user.email "actions@github.com"
          git add seen_vins.json
          git diff --staged --quiet || git commit -m "update seen vins"
          git push
